services:
  - type: web
    name: school-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
    preDeployCommand: python manage.py migrate && python manage.py loaddata data.json